name: "Draw Keymap"

on:
  workflow_dispatch:
  # push時に自動で実行する場合は、以下のコメントアウトを外す
  # push:
  #   paths:
  #     - "config/coron.keymap"
  #     - "keymap_drawer.config.yaml"
  #     - "config/coron.dtsi"

jobs:
  draw:
    uses: caksoylar/keymap-drawer/.github/workflows/draw-zmk.yml@f9cf9d3677368a7fb1dc505c51b8156fafa66fe2
    permissions:
      contents: write
    with:
      commit_message: "[Draw] ${{ github.event.head_commit.message || 'Update keymap drawing' }}"
      amend_commit: false
      keymap_patterns: "config/*.keymap"
      json_path: "config"
      config_path: "keymap_drawer.config.yaml" # config file, ignored if not exists
      output_folder: "keymap-drawer"
      destination: "both"

  add_idx:
    name: "Add idx labels to SVG"
    needs: draw
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Pull latest (include draw commit)
        run: git pull origin ${{ github.ref_name }}

      - name: Add idx labels to SVG
        run: python3 keymap-drawer/add_idx_labels.py

      - name: Commit idx-annotated SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add keymap-drawer/coron.svg
          if git diff --staged --quiet; then
            echo "変更なし（すでにラベル済み）"
          else
            git commit -m "chore: add idx labels to SVG"
            git push
          fi
